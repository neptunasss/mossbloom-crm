<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mossbloom CRM — Sign In</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 360px;
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2ea043, #56d364);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 16px;
      letter-spacing: -1px;
    }

    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 4px;
    }

    .brand p {
      font-size: 13px;
      color: #8b949e;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #c9d1d9;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    input::placeholder { color: #484f58; }

    input:focus {
      border-color: #1f6feb;
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.15);
    }

    .error {
      background: rgba(218, 54, 51, 0.15);
      border: 1px solid #da3633;
      color: #ff7b72;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      background: #238636;
      color: #fff;
      border: 1px solid rgba(240, 246, 252, 0.1);
      border-radius: 6px;
      padding: 11px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      margin-top: 4px;
    }

    .btn:hover { background: #2ea043; }
    .btn:active { background: #1a7f37; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .stores {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #21262d;
    }

    .store-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #6e7681;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">M</div>
      <h1>Mossbloom CRM</h1>
      <p>Sign in to your account</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="error" id="error" hidden></div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>

    <div class="stores">
      <span class="store-dot"><span class="dot" style="background:#2ea043"></span>bloom.lt</span>
      <span class="store-dot"><span class="dot" style="background:#1f6feb"></span>mossbloom.dk</span>
      <span class="store-dot"><span class="dot" style="background:#da3633"></span>mossbloom.de</span>
    </div>
  </div>

  <script>
    // Redirect if already authenticated
    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/';
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');

      errorEl.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errorEl.textContent = 'Connection error — please try again';
        errorEl.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
