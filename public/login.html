<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mossbloom CRM — Sign In</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    }

    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      background: #e8faf0;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .brand-logo svg { color: #34c759; }

    .brand h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .brand p {
      font-size: 13px;
      color: #86868b;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12.5px;
      font-weight: 500;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.14);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      color: #1d1d1f;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }

    input::placeholder { color: #aeaeb2; }

    input:focus {
      border-color: #007aff;
      box-shadow: 0 0 0 3px rgba(0,122,255,0.15);
    }

    .error {
      background: #fff0ef;
      border: 1px solid rgba(255,59,48,0.3);
      color: #cc2f26;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    .btn {
      width: 100%;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      margin-top: 4px;
      letter-spacing: -0.01em;
    }

    .btn:hover  { background: #0071e3; }
    .btn:active { background: #0066cc; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .stores {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    .store-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #86868b;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <i data-lucide="leaf" style="width:26px;height:26px;stroke-width:2;"></i>
      </div>
      <h1>Mossbloom CRM</h1>
      <p>Sign in to your account</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="error" id="error" hidden></div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>

    <div class="stores">
      <span class="store-dot"><span class="dot" style="background:#34c759"></span>bloom.lt</span>
      <span class="store-dot"><span class="dot" style="background:#007aff"></span>mossbloom.dk</span>
      <span class="store-dot"><span class="dot" style="background:#ff3b30"></span>mossbloom.de</span>
    </div>
  </div>

  <script>
    lucide.createIcons();

    fetch('/api/auth/status').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/';
    }).catch(() => {});

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submit-btn');

      errorEl.hidden = true;
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (res.ok) {
          window.location.href = '/';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.hidden = false;
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      } catch {
        errorEl.textContent = 'Connection error — please try again';
        errorEl.hidden = false;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
